name: Build EInk Quick Flasher

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyqt5 pyserial esptool pyinstaller

      - name: Build exe
        run: |
          pyinstaller --onefile --windowed --name "EInk-Quick-Flasher" --hidden-import esptool --hidden-import serial --collect-all esptool main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EInk-Quick-Flasher
          path: dist/EInk-Quick-Flasher.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/EInk-Quick-Flasher.exe
